<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>收款通知書模板</title>
<style>
body{font-family:"Microsoft JhengHei",Arial,sans-serif;margin:40px;color:#17212b}
h1{text-align:center}
.box{border:1px solid #999;padding:20px;margin-top:24px}
.row{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid #ddd;padding:12px 0}
.row:last-child{border-bottom:0}
</style>
</head>
<body>
<h1>收款通知書模板</h1>
<div class="box">

  <div class="row"><b>案件編號</b><span>＿＿＿＿＿＿＿＿＿＿＿＿</span></div>
  <div class="row"><b>活動日期</b><span>＿＿＿＿＿＿＿＿＿＿＿＿</span></div>
  <div class="row"><b>核定金額</b><span>NT$ ＿＿＿＿＿＿＿＿</span></div>
  <div class="row"><b>繳費期限</b><span>活動日前後一週內完成繳款</span></div>
</div>
</body>
</html>
